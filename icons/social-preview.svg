<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="socialBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="socialArcFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#socialBg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Icon (centered-left area), gauge centered at origin within this group -->
  <g transform="translate(380, 320)">
    <!-- Gauge 270° arc track: radius 88, from 135° to 45° clockwise -->
    <!-- 135° on r=88: (-62.2, 62.2), 45° on r=88: (62.2, 62.2) -->
    <path d="M -62.2 62.2 A 88 88 0 1 1 62.2 62.2" fill="none" stroke="#2a2a4a" stroke-width="10" stroke-linecap="round"/>

    <!-- Gauge filled arc: ~70% of 270° = 189°, ends at 324° = cos(-36°)*88, sin(-36°)*88 = (71.2, -51.7) -->
    <path d="M -62.2 62.2 A 88 88 0 1 1 71.2 -51.7" fill="none" stroke="url(#socialArcFill)" stroke-width="10" stroke-linecap="round"/>

    <!-- Major ticks (outer r=100 to inner r=90, every 45° from 135° to 45°) -->
    <line x1="-70.7" y1="70.7" x2="-63.6" y2="63.6" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
    <line x1="-100" y1="0" x2="-90" y2="0" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
    <line x1="-70.7" y1="-70.7" x2="-63.6" y2="-63.6" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-100" x2="0" y2="-90" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
    <line x1="70.7" y1="-70.7" x2="63.6" y2="-63.6" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="0" x2="90" y2="0" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
    <line x1="70.7" y1="70.7" x2="63.6" y2="63.6" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>

    <!-- Cursor logo (512x512 original, centered at 256,256) -->
    <g transform="scale(0.30) translate(-256,-256)">
      <path d="M415.035 156.35l-151.503-87.4695c-4.865-2.8094-10.868-2.8094-15.733 0L96.302 156.35c-4.0897 2.362-6.6146 6.729-6.6146 11.459v176.383c0 4.73 2.5249 9.097 6.6146 11.458l151.5039 87.47c4.865 2.809 10.868 2.809 15.733 0l151.504-87.47c4.089-2.361 6.614-6.728 6.614-11.458V167.809c0-4.73-2.525-9.097-6.614-11.459z" 
            fill="none" stroke="#e0e7ff" stroke-width="12" opacity="0.9"/>
      <path d="M405.519 174.878L259.264 428.198c-.988 1.707-3.599 1.01-3.599-.967V261.359c0-3.314-1.771-6.379-4.644-8.044L107.376 170.383c-1.707-.988-1.01-3.599.968-3.599h292.509c4.154 0 6.75 4.503 4.673 8.101l-.007-.007z" 
            fill="#e0e7ff" opacity="0.95"/>
    </g>

    <!-- Needle glow at filled arc endpoint -->
    <circle cx="71.2" cy="-51.7" r="6" fill="#ec4899" opacity="0.5"/>
    <circle cx="71.2" cy="-51.7" r="3" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Text -->
  <text x="600" y="290" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#f0f0ff">Cursor Usage</text>
  <text x="600" y="355" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#f0f0ff">Tracker</text>
  <text x="600" y="410" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8">Track AI usage &amp; billing with official APIs</text>
</svg>
